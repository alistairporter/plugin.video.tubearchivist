name: Create Release

on:
  push:
    branches:
      - main
    paths:
      - 'addon.xml'
  workflow_dispatch:

jobs:
  release:
    runs-on: docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to compare

      - name: Extract version from addon.xml
        id: get_version
        run: |
          VERSION=$(grep -oP 'version="\K[^"]+' addon.xml)

          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not extract version from addon.xml"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if version changed
        id: check_version
        run: |
          # If triggered by workflow_dispatch, always proceed
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Manual trigger - proceeding with release"
            exit 0
          fi

          # Get version from previous commit
          git checkout HEAD~1 -- addon.xml 2>/dev/null || true
          if [ -f addon.xml ]; then
            OLD_VERSION=$(grep -oP 'version="\K[^"]+' addon.xml)
            git checkout HEAD -- addon.xml
          else
            OLD_VERSION=""
          fi

          NEW_VERSION="${{ steps.get_version.outputs.version }}"
          echo "Old version: $OLD_VERSION"
          echo "New version: $NEW_VERSION"

          if [ "$OLD_VERSION" != "$NEW_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed from $OLD_VERSION to $NEW_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged, skipping release"
          fi

      - name: Check if tag exists
        id: check_tag
        if: steps.check_version.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION does not exist"
          fi

      - name: Create git tag
        if: steps.check_version.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"

          # Validate VERSION is not empty
          if [ -z "$VERSION" ]; then
            echo "ERROR: VERSION is empty"
            exit 1
          fi

          echo "Creating tag v$VERSION"
          git config user.name "Forgejo Actions"
          git config user.email "actions@forgejo.local"
          git tag -a "v$VERSION" -m "Release version $VERSION"
          git push origin "v$VERSION"

      - name: Package addon
        if: steps.check_version.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          ADDON_ID=$(grep -oP 'id="\K[^"]+' addon.xml)

          # Validate inputs
          if [ -z "$VERSION" ] || [ -z "$ADDON_ID" ]; then
            echo "ERROR: VERSION or ADDON_ID is empty"
            exit 1
          fi

          echo "Packaging $ADDON_ID version $VERSION"

          # Create a temporary directory for packaging
          mkdir -p /tmp/package/$ADDON_ID

          # Copy addon files excluding git, cache, and development files
          tar --exclude='.git' \
              --exclude='.gitea' \
              --exclude='.forgejo' \
              --exclude='.github' \
              --exclude='__pycache__' \
              --exclude='*.pyc' \
              --exclude='.DS_Store' \
              --exclude='*.yaml' \
              --exclude='*.md' \
              -cf - . | tar -xf - -C /tmp/package/$ADDON_ID

          # Create zip file
          cd /tmp/package
          zip -r "$ADDON_ID-$VERSION.zip" "$ADDON_ID"
          mv "$ADDON_ID-$VERSION.zip" $GITHUB_WORKSPACE/

          echo "Created package: $ADDON_ID-$VERSION.zip"

      - name: Generate changelog
        if: steps.check_version.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"

          # Try to get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            echo "## Changes since $LAST_TAG" > changelog.md
            echo "" >> changelog.md
            git log $LAST_TAG..HEAD --pretty=format:"- %s" >> changelog.md
          else
            echo "## Release v$VERSION" > changelog.md
            echo "" >> changelog.md
            echo "Initial release" >> changelog.md
          fi

          cat changelog.md

      - name: Create Release
        if: steps.check_version.outputs.changed == 'true' && steps.check_tag.outputs.exists == 'false'
        uses: actions/forgejo-release@v2
        with:
          direction: upload
          token: ${{ secrets.GITHUB_TOKEN }}
          release-dir: ./
          release-notes: ./changelog.md
          tag: v${{ steps.get_version.outputs.version }}
          title: Release v${{ steps.get_version.outputs.version }}
