name: Create Release

on:
  push:
    branches:
      - main
    paths:
      - 'addon.xml'
  workflow_dispatch:

jobs:
  prepare:
    runs-on: docker
    outputs:
      version: ${{ steps.check.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to compare

      - name: Check version and determine if release needed
        id: check
        run: |
          # Extract version
          VERSION=$(sed -n 's/.*version="\([^"]*\)".*/\1/p' addon.xml | head -1)

          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not extract version from addon.xml"
            exit 1
          fi

          echo "Current version: $VERSION"

          # Always set version output
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if tag already exists
          if git ls-remote --tags origin | grep -q "refs/tags/v$VERSION$"; then
            echo "Tag v$VERSION already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # If triggered by workflow_dispatch, always proceed
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger - proceeding with release"
            echo "should_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if version changed from previous commit
          git checkout HEAD~1 -- addon.xml 2>/dev/null || true
          if [ -f addon.xml ]; then
            OLD_VERSION=$(sed -n 's/.*version="\([^"]*\)".*/\1/p' addon.xml | head -1)
            git checkout HEAD -- addon.xml
          else
            OLD_VERSION=""
          fi

          echo "Previous version: $OLD_VERSION"

          if [ "$OLD_VERSION" != "$VERSION" ]; then
            echo "Version changed from $OLD_VERSION to $VERSION"
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Create git tag
        if: steps.check.outputs.should_release == 'true'
        run: |
          VERSION=$(sed -n 's/.*version="\([^"]*\)".*/\1/p' addon.xml | head -1)

          echo "Creating tag v$VERSION"
          git config user.name "Forgejo Actions"
          git config user.email "actions@forgejo.local"
          git tag -a "v$VERSION" -m "Release version $VERSION"
          git push origin "v$VERSION"

      - name: Install zip utility
        if: steps.check.outputs.should_release == 'true'
        run: |
          apt-get update -qq
          apt-get install -y -qq zip

      - name: Package addon
        if: steps.check.outputs.should_release == 'true'
        run: |
          VERSION=$(sed -n 's/.*version="\([^"]*\)".*/\1/p' addon.xml | head -1)
          ADDON_ID=$(sed -n 's/.*id="\([^"]*\)".*/\1/p' addon.xml | head -1)

          echo "Packaging $ADDON_ID version $VERSION"

          # Create a temporary directory for packaging
          mkdir -p /tmp/package/$ADDON_ID

          # Copy addon files excluding git, cache, and development files
          tar --exclude='.git' \
              --exclude='.gitea' \
              --exclude='.forgejo' \
              --exclude='.github' \
              --exclude='__pycache__' \
              --exclude='*.pyc' \
              --exclude='.DS_Store' \
              --exclude='*.yaml' \
              --exclude='*.md' \
              -cf - . | tar -xf - -C /tmp/package/$ADDON_ID

          # Create zip file
          cd /tmp/package
          zip -r "$ADDON_ID-$VERSION.zip" "$ADDON_ID"
          mv "$ADDON_ID-$VERSION.zip" $GITHUB_WORKSPACE/

          echo "Created package: $ADDON_ID-$VERSION.zip"

      - name: Generate changelog
        if: steps.check.outputs.should_release == 'true'
        run: |
          VERSION=$(sed -n 's/.*version="\([^"]*\)".*/\1/p' addon.xml | head -1)

          # Try to get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            echo "## Changes since $LAST_TAG" > changelog.md
            echo "" >> changelog.md
            git log $LAST_TAG..HEAD --pretty=format:"- %s" >> changelog.md
          else
            echo "## Release v$VERSION" > changelog.md
            echo "" >> changelog.md
            echo "Initial release" >> changelog.md
          fi

          cat changelog.md

      - name: Upload artifacts
        if: steps.check.outputs.should_release == 'true'
        uses: actions/upload-artifact@v3
        with:
          name: release-assets
          path: |
            *.zip
            changelog.md

  release:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: docker
    steps:
      - name: Debug outputs
        run: |
          echo "should_release: ${{ needs.prepare.outputs.should_release }}"
          echo "version: ${{ needs.prepare.outputs.version }}"

      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: release-assets

      - name: List downloaded files
        run: |
          echo "Downloaded files:"
          ls -la
          echo ""
          echo "Changelog contents:"
          cat changelog.md

      - name: Read changelog
        id: changelog
        run: |
          CHANGELOG=$(cat changelog.md)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat changelog.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: actions/forgejo-release@v2
        with:
          direction: upload
          token: ${{ secrets.GITHUB_TOKEN }}
          release-dir: ./
          release-notes: ${{ steps.changelog.outputs.changelog }}
          tag: v${{ needs.prepare.outputs.version }}
          title: Release v${{ needs.prepare.outputs.version }}
